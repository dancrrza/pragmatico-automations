<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pragmatico — Session Recording</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #fff;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 24px;
    }
    .container { max-width: 900px; width: 100%; }
    .header { margin-bottom: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p  { font-size: 14px; color: #888; margin-top: 4px; }
    video { width: 100%; border-radius: 8px; background: #000; display: block; }
    .footer { margin-top: 12px; font-size: 12px; color: #555; text-align: center; }
    .error { background: #1a0000; border: 1px solid #ff4444; border-radius: 8px; padding: 32px; text-align: center; color: #ff8888; }
    .fallback {
      background: #111; border: 1px solid #333;
      border-radius: 8px; padding: 32px; text-align: center;
    }
    .fallback p { color: #aaa; margin-bottom: 20px; font-size: 15px; }
    .btn {
      display: inline-block;
      background: #fff; color: #000;
      padding: 12px 28px; border-radius: 6px;
      text-decoration: none; font-weight: 600; font-size: 15px;
    }
    .btn:hover { background: #ddd; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="session-title">Loading session...</h1>
      <p id="session-meta"></p>
    </div>
    <div id="player-wrap"></div>
    <div class="footer">Pragmatico &mdash; For internal use only</div>
  </div>

  <script>
    const params      = new URLSearchParams(window.location.search);
    const videoUrl    = params.get('v') || '';
    const sessionId   = params.get('s') || '';
    const email       = params.get('e') || '';
    const sessionDate = params.get('d') || '';
    const title       = params.get('t') || 'Session Recording';

    const N8N_WEBHOOK  = 'https://pragmatico.app.n8n.cloud/webhook/video-watch';
    const PING_INTERVAL = 30;

    document.getElementById('session-title').textContent = decodeURIComponent(title);
    if (sessionDate) document.getElementById('session-meta').textContent = sessionDate;

    const wrap = document.getElementById('player-wrap');

    if (!videoUrl) {
      wrap.innerHTML = '<div class="error">Invalid link — missing video URL.</div>';
    } else {
      const decodedUrl = decodeURIComponent(videoUrl);

      // Try video player first
      const video = document.createElement('video');
      video.controls = true;
      video.src = decodedUrl;
      wrap.appendChild(video);

      let lastPing = 0;
      let maxReached = 0;
      let canPlay = false;

      function ping(event) {
        const pct = video.duration ? Math.round((video.currentTime / video.duration) * 100) : 0;
        if (video.currentTime > maxReached) maxReached = video.currentTime;
        const payload = JSON.stringify({
          email: decodeURIComponent(email), sessionId, sessionDate, event,
          currentTime: Math.round(video.currentTime),
          duration: Math.round(video.duration || 0),
          pctWatched: pct, maxReached: Math.round(maxReached)
        });
        if (navigator.sendBeacon) {
          navigator.sendBeacon(N8N_WEBHOOK, new Blob([payload], { type: 'application/json' }));
        } else {
          fetch(N8N_WEBHOOK, { method: 'POST', body: payload,
            headers: { 'Content-Type': 'application/json' }, keepalive: true });
        }
      }

      video.addEventListener('canplay', () => { canPlay = true; });
      video.addEventListener('play',   () => ping('play'));
      video.addEventListener('pause',  () => ping('pause'));
      video.addEventListener('ended',  () => ping('ended'));
      video.addEventListener('seeked', () => ping('seeked'));
      video.addEventListener('timeupdate', () => {
        if (!video.paused && (video.currentTime - lastPing) >= PING_INTERVAL) {
          ping('progress'); lastPing = video.currentTime;
        }
      });

      // Fallback: if video can't load (CORS / format issue), show download button
      video.addEventListener('error', showFallback);
      setTimeout(() => { if (!canPlay) showFallback(); }, 5000);

      function showFallback() {
        if (wrap.querySelector('.fallback')) return;
        video.remove();
        wrap.innerHTML = `
          <div class="fallback">
            <p>Your browser cannot play this video directly.<br>Click below to download and watch.</p>
            <a class="btn" href="${decodedUrl}" download>Download Recording</a>
          </div>`;
        ping('download_fallback');
      }
    }
  </script>
</body>
</html>
