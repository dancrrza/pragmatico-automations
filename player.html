<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pragmatico — Session Recording</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #fff;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 24px;
    }
    .container { max-width: 900px; width: 100%; }
    .header { margin-bottom: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p  { font-size: 14px; color: #888; margin-top: 4px; }
    video { width: 100%; border-radius: 8px; background: #000; display: block; }
    .footer { margin-top: 12px; font-size: 12px; color: #555; text-align: center; }
    .fallback {
      background: #111; border: 1px solid #333;
      border-radius: 8px; padding: 32px; text-align: center;
    }
    .fallback p { color: #aaa; margin-bottom: 20px; font-size: 15px; }
    .btn {
      display: inline-block; background: #fff; color: #000;
      padding: 12px 28px; border-radius: 6px;
      text-decoration: none; font-weight: 600; font-size: 15px;
    }
    .btn:hover { background: #ddd; }
    #gate {
      min-height: 100vh; width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .gate-box {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 48px 40px;
      max-width: 440px; width: 100%; text-align: center;
    }
    .gate-box h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .gate-session { font-size: 14px; color: #888; margin-bottom: 32px; }
    .gate-box label { display: block; text-align: left; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .gate-box input[type="email"] {
      width: 100%; padding: 12px 16px;
      background: #111; border: 1px solid #333;
      border-radius: 8px; color: #fff; font-size: 15px;
      margin-bottom: 16px; outline: none;
    }
    .gate-box input[type="email"]:focus { border-color: #666; }
    .gate-box input[type="email"]::placeholder { color: #555; }
    .gate-btn {
      width: 100%; padding: 13px;
      background: #fff; color: #000;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .gate-btn:hover { background: #e0e0e0; }
    .gate-error { color: #ff6b6b; font-size: 13px; margin-top: 12px; }
    .gate-note { font-size: 12px; color: #555; margin-top: 20px; }
    #player-section { display: none; }
  </style>
</head>
<body>

  <div id="gate">
    <div class="gate-box">
      <h2>Access Session Recording</h2>
      <p class="gate-session" id="gate-session-info">Loading...</p>
      <label for="email-input">Enter your work email to continue</label>
      <input type="email" id="email-input" placeholder="you@company.com" autocomplete="email">
      <button class="gate-btn" id="watch-btn">Watch Recording &rarr;</button>
      <p class="gate-error" id="gate-error"></p>
      <p class="gate-note">Your viewing progress is tracked for compliance.</p>
    </div>
  </div>

  <div id="player-section">
    <div class="container">
      <div class="header">
        <h1 id="session-title">Loading session...</h1>
        <p id="session-meta"></p>
      </div>
      <div id="player-wrap"></div>
      <div class="footer">Pragmatico &mdash; For internal use only</div>
    </div>
  </div>

  <script>
    const params      = new URLSearchParams(window.location.search);
    const videoUrl    = params.get('v') || '';
    const sessionId   = params.get('s') || '';
    const sessionDate = params.get('d') || '';
    const title       = params.get('t') || 'Session Recording';

    const N8N_WEBHOOK  = 'https://pragmatico.app.n8n.cloud/webhook/video-watch';
    const PING_INTERVAL = 30;

    const decodedTitle = decodeURIComponent(title);
    document.getElementById('gate-session-info').textContent =
      decodedTitle + (sessionDate ? ' — ' + decodeURIComponent(sessionDate) : '');

    const emailInput = document.getElementById('email-input');
    const watchBtn   = document.getElementById('watch-btn');
    const gateError  = document.getElementById('gate-error');

    function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    watchBtn.addEventListener('click', function() {
      const email = emailInput.value.trim();
      if (!email) { gateError.textContent = 'Please enter your email.'; return; }
      if (!isValidEmail(email)) { gateError.textContent = 'Please enter a valid email address.'; return; }
      if (!videoUrl) { gateError.textContent = 'Invalid session link. Contact your administrator.'; return; }
      launchPlayer(email);
    });

    emailInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') watchBtn.click();
    });

    function sendPing(payload) {
      console.log('[Pragmatico] ping:', payload.event, payload);
      fetch(N8N_WEBHOOK, {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: { 'Content-Type': 'application/json' },
        credentials: 'omit',
        keepalive: true
      }).then(function(r) {
        console.log('[Pragmatico] ping sent:', r.status);
      }).catch(function(err) {
        console.error('[Pragmatico] ping failed:', err);
      });
    }

    function launchPlayer(email) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('player-section').style.display = 'block';
      document.getElementById('session-title').textContent = decodedTitle;
      if (sessionDate) document.getElementById('session-meta').textContent = decodeURIComponent(sessionDate);

      const wrap = document.getElementById('player-wrap');
      const decodedUrl = decodeURIComponent(videoUrl);
      let lastPing = 0, maxReached = 0, canPlay = false;

      function ping(event, overrideTime) {
        const vid = document.getElementById('main-video');
        const currentTime = (vid && overrideTime === undefined) ? vid.currentTime : (overrideTime || 0);
        const duration    = (vid && vid.duration) ? vid.duration : 0;
        const pct = duration ? Math.round((currentTime / duration) * 100) : 0;
        if (currentTime > maxReached) maxReached = currentTime;
        sendPing({
          email:       email.toLowerCase().trim(),
          sessionId:   sessionId,
          sessionDate: decodeURIComponent(sessionDate),
          event:       event,
          currentTime: Math.round(currentTime),
          duration:    Math.round(duration),
          pctWatched:  pct,
          maxReached:  Math.round(maxReached)
        });
      }

      const vid = document.createElement('video');
      vid.controls = true;
      vid.id = 'main-video';
      vid.src = decodedUrl;
      wrap.appendChild(vid);

      vid.addEventListener('canplay', function() { canPlay = true; });
      vid.addEventListener('play',    function() { ping('play'); });
      vid.addEventListener('pause',   function() { ping('pause'); });
      vid.addEventListener('ended',   function() { ping('ended'); });
      vid.addEventListener('seeked',  function() { ping('seeked'); });
      vid.addEventListener('timeupdate', function() {
        if (!vid.paused && (vid.currentTime - lastPing) >= PING_INTERVAL) {
          ping('progress'); lastPing = vid.currentTime;
        }
      });

      vid.addEventListener('error', showFallback);
      setTimeout(function() { if (!canPlay) showFallback(); }, 5000);

      function showFallback() {
        if (wrap.querySelector('.fallback')) return;
        ping('download_fallback', 0);
        vid.remove();
        wrap.innerHTML = '<div class="fallback"><p>Your browser cannot play this video directly.<br>Click below to download and watch.</p><a class="btn" href="' + decodedUrl + '" download>Download Recording</a></div>';
      }
    }
  </script>
</body>
</html>
