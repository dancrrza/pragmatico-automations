name: Merge Pragmatico Session Recordings

on:
  workflow_dispatch:
    inputs:
      coordinator_url:
        description: 'Main room bot recording URL'
        required: true
      br1_url:
        description: 'Breakout Room 1 recording URL (leave empty if no breakout)'
        required: false
        default: ''
      br2_url:
        description: 'Breakout Room 2 recording URL (leave empty if no breakout)'
        required: false
        default: ''
      coordinator_start_time:
        description: 'ISO timestamp when coordinator bot started recording (from Recall API)'
        required: false
        default: ''
      t1:
        description: 'ISO timestamp when first breakout opened (leave empty if no breakouts)'
        required: false
        default: ''
      t2:
        description: 'ISO timestamp when last breakout closed (leave empty if no breakouts)'
        required: false
        default: ''
      session_title:
        description: 'Session title'
        required: true
      session_date:
        description: 'Session date (YYYY-MM-DD)'
        required: true
      meeting_id:
        description: 'Zoom Meeting ID'
        required: true

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download coordinator (main room) recording
        run: |
          echo "Downloading coordinator recording..."
          curl -L --retry 3 "${{ github.event.inputs.coordinator_url }}" -o coordinator.mp4
          echo "Coordinator size: $(du -sh coordinator.mp4 | cut -f1)"

      - name: Download breakout recordings
        run: |
          BR1="${{ github.event.inputs.br1_url }}"
          BR2="${{ github.event.inputs.br2_url }}"

          if [ -n "$BR1" ]; then
            echo "Downloading Breakout Room 1..."
            curl -L --retry 3 "$BR1" -o br1.mp4
            echo "BR1 size: $(du -sh br1.mp4 | cut -f1)"
          else
            echo "No Breakout Room 1 URL provided."
          fi

          if [ -n "$BR2" ]; then
            echo "Downloading Breakout Room 2..."
            curl -L --retry 3 "$BR2" -o br2.mp4
            echo "BR2 size: $(du -sh br2.mp4 | cut -f1)"
          else
            echo "No Breakout Room 2 URL provided."
          fi

      - name: Build merged video
        run: |
          T1="${{ github.event.inputs.t1 }}"
          T2="${{ github.event.inputs.t2 }}"
          COORD_START="${{ github.event.inputs.coordinator_start_time }}"

          if [ -n "$T1" ] && [ -n "$T2" ] && [ -n "$COORD_START" ]; then
            echo "=== SMART MERGE MODE (timestamp-based) ==="

            # Convert ISO timestamps to Unix epoch (seconds)
            coord_epoch=$(date -d "$COORD_START" +%s)
            t1_epoch=$(date -d "$T1" +%s)
            t2_epoch=$(date -d "$T2" +%s)

            cut_a_end=$((t1_epoch - coord_epoch))
            cut_b_start=$((t2_epoch - coord_epoch))

            echo "Coordinator started at: $COORD_START (epoch: $coord_epoch)"
            echo "First breakout opened:  $T1 (epoch: $t1_epoch)"
            echo "Last breakout closed:   $T2 (epoch: $t2_epoch)"
            echo "Intro segment: 0s → ${cut_a_end}s"
            echo "Closing segment: ${cut_b_start}s → end"

            # Validate cut points make sense
            if [ "$cut_a_end" -le 0 ]; then
              echo "WARNING: cut_a_end is $cut_a_end — T1 is before or equal to coordinator start. Using 0."
              cut_a_end=0
            fi

            # Segment A: main room intro (start → T1)
            if [ "$cut_a_end" -gt 0 ]; then
              ffmpeg -i coordinator.mp4 -t $cut_a_end -c copy segment_a.mp4
              echo "Segment A (intro): ${cut_a_end}s"
            fi

            # Segment B: main room closing (T2 → end)
            ffmpeg -i coordinator.mp4 -ss $cut_b_start -c copy segment_b.mp4
            echo "Segment B (closing): from ${cut_b_start}s to end"

            # Build concat file list
            > filelist.txt

            if [ "$cut_a_end" -gt 0 ] && [ -f segment_a.mp4 ]; then
              echo "file 'segment_a.mp4'" >> filelist.txt
            fi

            if [ -f br1.mp4 ]; then
              echo "file 'br1.mp4'" >> filelist.txt
            fi

            if [ -f br2.mp4 ]; then
              echo "file 'br2.mp4'" >> filelist.txt
            fi

            if [ -f segment_b.mp4 ]; then
              echo "file 'segment_b.mp4'" >> filelist.txt
            fi

            echo "=== Merge order ==="
            cat filelist.txt

            ffmpeg -f concat -safe 0 -i filelist.txt -c copy merged.mp4

          else
            echo "=== SIMPLE MODE (no breakout timestamps — using coordinator recording) ==="
            cp coordinator.mp4 merged.mp4
          fi

          echo "Final video size: $(du -sh merged.mp4 | cut -f1)"

      - name: Upload to GitHub Release
        id: upload_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SESSION_DATE="${{ github.event.inputs.session_date }}"
          MEETING_ID="${{ github.event.inputs.meeting_id }}"
          SESSION_TITLE="${{ github.event.inputs.session_title }}"
          FILENAME="session-${SESSION_DATE}-${MEETING_ID}.mp4"
          TAG="session-${SESSION_DATE}-${MEETING_ID}"

          # Create the release and upload the file
          gh release create "$TAG" \
            --title "Session: ${SESSION_TITLE} (${SESSION_DATE})" \
            --notes "Zoom Meeting ID: ${MEETING_ID} | Auto-generated by Pragmatico Recording System" \
            "merged.mp4#${FILENAME}" \
            --repo ${{ github.repository }}

          # Get the public download URL
          VIDEO_URL=$(gh release view "$TAG" \
            --json assets \
            --jq ".assets[] | select(.name == \"${FILENAME}\") | .browserDownloadUrl" \
            --repo ${{ github.repository }})

          echo "video_url=$VIDEO_URL" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "=== Video uploaded ==="
          echo "URL: $VIDEO_URL"

      - name: Upload to Fireflies for transcript
        env:
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
        run: |
          VIDEO_URL="${{ steps.upload_release.outputs.video_url }}"
          TITLE="${{ github.event.inputs.session_title }} — ${{ github.event.inputs.session_date }}"

          echo "Uploading to Fireflies for transcript (NOT for sharing)..."

          RESPONSE=$(curl -s -X POST https://api.fireflies.ai/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $FIREFLIES_API_KEY" \
            -d "{
              \"query\": \"mutation { uploadAudio(input: { url: \\\"$VIDEO_URL\\\", title: \\\"$TITLE\\\", save_video: true }) { id title } }\"
            }")

          echo "Fireflies response: $RESPONSE"

      - name: Notify n8n with video URL
        env:
          N8N_CALLBACK_URL: ${{ secrets.N8N_CALLBACK_URL }}
        run: |
          if [ -n "$N8N_CALLBACK_URL" ]; then
            echo "Notifying n8n..."
            curl -s -X POST "$N8N_CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"meeting_id\": \"${{ github.event.inputs.meeting_id }}\",
                \"session_date\": \"${{ github.event.inputs.session_date }}\",
                \"session_title\": \"${{ github.event.inputs.session_title }}\",
                \"video_url\": \"${{ steps.upload_release.outputs.video_url }}\"
              }"
            echo "n8n notified."
          else
            echo "No N8N_CALLBACK_URL set — skipping notification."
          fi
