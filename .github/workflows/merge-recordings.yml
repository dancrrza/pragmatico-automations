name: Merge Pragmatico Session Recordings

on:
  workflow_dispatch:
    inputs:
      bot1_url:
        description: 'Bot 1 recording URL (main room → BR1 → main room closing)'
        required: true
      bot2_url:
        description: 'Bot 2 recording URL (main room → BR2 → main room closing)'
        required: false
        default: ''
      bot1_start_time:
        description: 'ISO timestamp when Bot 1 started recording'
        required: true
      bot2_start_time:
        description: 'ISO timestamp when Bot 2 started recording'
        required: false
        default: ''
      t1:
        description: 'ISO timestamp when first bot entered a breakout room'
        required: false
        default: ''
      t2:
        description: 'ISO timestamp when last breakout room closed'
        required: false
        default: ''
      session_title:
        description: 'Session title (used in the video URL)'
        required: true
      session_date:
        description: 'Session date (YYYY-MM-DD)'
        required: true
      meeting_id:
        description: 'Zoom Meeting ID'
        required: true
      host:
        description: 'Host identifier (michael, alysha, or daniela)'
        required: false
        default: 'michael'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install FFmpeg
        run: |
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
            | tar xJ --wildcards --strip-components=1 -C /usr/local/bin '*/ffmpeg' '*/ffprobe'
          ffmpeg -version

      - name: Download Bot 1 recording
        run: |
          echo "Downloading Bot 1..."
          curl -L --retry 3 "${{ github.event.inputs.bot1_url }}" -o bot1.mp4
          echo "Bot 1 size: $(du -sh bot1.mp4 | cut -f1)"

      - name: Download Bot 2 recording
        run: |
          BOT2="${{ github.event.inputs.bot2_url }}"
          if [ -n "$BOT2" ]; then
            echo "Downloading Bot 2..."
            curl -L --retry 3 "$BOT2" -o bot2.mp4
            echo "Bot 2 size: $(du -sh bot2.mp4 | cut -f1)"
          else
            echo "No Bot 2 URL — session had no breakout rooms or only 1 bot."
          fi

      - name: Build merged video
        run: |
          T1="${{ github.event.inputs.t1 }}"
          T2="${{ github.event.inputs.t2 }}"
          BOT1_START="${{ github.event.inputs.bot1_start_time }}"
          BOT2_START="${{ github.event.inputs.bot2_start_time }}"

          if [ -n "$T1" ] && [ -n "$T2" ] && [ -n "$BOT1_START" ]; then
            echo "=== SMART MERGE MODE ==="
            bot1_epoch=$(date -d "$BOT1_START" +%s)
            t1_epoch=$(date -d "$T1" +%s)
            t2_epoch=$(date -d "$T2" +%s)
            intro_end=$((t1_epoch - bot1_epoch))
            br1_end=$((t2_epoch - bot1_epoch))
            if [ "$intro_end" -le 0 ]; then intro_end=0; fi
            [ "$intro_end" -gt 0 ] && ffmpeg -i bot1.mp4 -t $intro_end -c copy intro.mp4
            ffmpeg -i bot1.mp4 -ss $intro_end -to $br1_end -c copy br1.mp4
            if [ -f bot2.mp4 ] && [ -n "$BOT2_START" ]; then
              bot2_epoch=$(date -d "$BOT2_START" +%s)
              br2_start=$((t1_epoch - bot2_epoch))
              br2_end=$((t2_epoch - bot2_epoch))
              [ "$br2_start" -lt 0 ] && br2_start=0
              ffmpeg -i bot2.mp4 -ss $br2_start -to $br2_end -c copy br2.mp4
            fi
            ffmpeg -i bot1.mp4 -ss $br1_end -c copy closing.mp4
            > filelist.txt
            [ -f intro.mp4   ] && echo "file 'intro.mp4'"   >> filelist.txt
            [ -f br1.mp4     ] && echo "file 'br1.mp4'"     >> filelist.txt
            [ -f br2.mp4     ] && echo "file 'br2.mp4'"     >> filelist.txt
            [ -f closing.mp4 ] && echo "file 'closing.mp4'" >> filelist.txt
            ffmpeg -f concat -safe 0 -i filelist.txt -c copy merged.mp4
          else
            echo "=== SIMPLE MODE ==="
            cp bot1.mp4 merged.mp4
          fi
          echo "Final video: $(du -sh merged.mp4 | cut -f1)"

      - name: Upload to GitHub Release
        id: upload_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="${{ github.event.inputs.session_date }}"
          TITLE="${{ github.event.inputs.session_title }}"
          MID="${{ github.event.inputs.meeting_id }}"

          # Sanitize title: lowercase, non-alphanumeric → hyphen, trim hyphens
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-*//;s/-*$//')
          [ -z "$SLUG" ] && SLUG="session"

          TAG="${SLUG}-${DATE}"
          FILENAME="${TAG}.mp4"

          mv merged.mp4 "${FILENAME}"
          gh release create "$TAG" \
            --title "${TITLE} (${DATE})" \
            --notes "Zoom Meeting ID: ${MID}" \
            "${FILENAME}" \
            --repo ${{ github.repository }}

          VIDEO_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${FILENAME}"
          echo "video_url=$VIDEO_URL" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "=== Video published: $VIDEO_URL ==="

      - name: Upload to Fireflies for transcript
        continue-on-error: true
        env:
          FIREFLIES_API_KEY_MICHAEL: ${{ secrets.FIREFLIES_API_KEY_MICHAEL }}
          FIREFLIES_API_KEY_ALYSHA: ${{ secrets.FIREFLIES_API_KEY_ALYSHA }}
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
        run: |
          HOST=$(echo "${{ github.event.inputs.host }}" | tr '[:upper:]' '[:lower:]')
          if [ "$HOST" = "alysha" ]; then
            KEY="$FIREFLIES_API_KEY_ALYSHA"
          elif [ "$HOST" = "daniela" ]; then
            KEY="$FIREFLIES_API_KEY"
          else
            KEY="$FIREFLIES_API_KEY_MICHAEL"
          fi
          VIDEO_URL="${{ steps.upload_release.outputs.video_url }}"
          TITLE="${{ github.event.inputs.session_title }} — ${{ github.event.inputs.session_date }}"
          echo "Sending to Fireflies ($HOST)..."
          curl -s -X POST https://api.fireflies.ai/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $KEY" \
            -d "{\"query\": \"mutation { uploadAudio(input: { url: \\\"$VIDEO_URL\\\", title: \\\"$TITLE\\\", save_video: true }) { success } }\"}"

      - name: Notify n8n with final video URL
        env:
          N8N_CALLBACK_URL: ${{ secrets.N8N_CALLBACK_URL }}
        run: |
          if [ -n "$N8N_CALLBACK_URL" ]; then
            curl -s -X POST "$N8N_CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"meeting_id\": \"${{ github.event.inputs.meeting_id }}\",
                \"session_date\": \"${{ github.event.inputs.session_date }}\",
                \"session_title\": \"${{ github.event.inputs.session_title }}\",
                \"video_url\": \"${{ steps.upload_release.outputs.video_url }}\"
              }"
          fi