name: Merge Pragmatico Recordings

# Triggered by n8n via GitHub API after all 3 Recall bots finish recording.
# Downloads 3 MP4 files to disk, merges with ffmpeg (stream copy, no re-encoding),
# uploads merged file to Fireflies, and notifies n8n when done.

on:
  workflow_dispatch:
    inputs:
      recording_url_1:
        description: 'Bot 1 recording URL — Main Room (Recall.ai S3 presigned URL)'
        required: true
        type: string
      recording_url_2:
        description: 'Bot 2 recording URL — Breakout 1 (Recall.ai S3 presigned URL)'
        required: true
        type: string
      recording_url_3:
        description: 'Bot 3 recording URL — Breakout 2 (optional, leave empty if only 2 rooms)'
        required: false
        type: string
        default: ''
      session_title:
        description: 'Session title — used as Fireflies meeting name'
        required: true
        type: string
      session_date:
        description: 'Session date (YYYY-MM-DD)'
        required: true
        type: string
      meeting_id:
        description: 'Zoom meeting ID — used for n8n callback tracking'
        required: true
        type: string

jobs:
  merge-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      # ── Step 1: Download all recordings to runner disk (no memory limits) ──────
      - name: Download Bot 1 — Main Room
        run: |
          echo "Downloading Bot 1 (Main Room)..."
          curl -L --retry 3 --retry-delay 5 --fail \
            "${{ inputs.recording_url_1 }}" \
            -o recording1.mp4
          echo "Size: $(du -sh recording1.mp4 | cut -f1)"

      - name: Download Bot 2 — Breakout 1
        run: |
          echo "Downloading Bot 2 (Breakout 1)..."
          curl -L --retry 3 --retry-delay 5 --fail \
            "${{ inputs.recording_url_2 }}" \
            -o recording2.mp4
          echo "Size: $(du -sh recording2.mp4 | cut -f1)"

      - name: Download Bot 3 — Breakout 2 (if provided)
        if: inputs.recording_url_3 != ''
        run: |
          echo "Downloading Bot 3 (Breakout 2)..."
          curl -L --retry 3 --retry-delay 5 --fail \
            "${{ inputs.recording_url_3 }}" \
            -o recording3.mp4
          echo "Size: $(du -sh recording3.mp4 | cut -f1)"

      # ── Step 2: Build ffmpeg concat list ────────────────────────────────────────
      - name: Build concat list
        run: |
          echo "file 'recording1.mp4'" > concat_list.txt
          echo "file 'recording2.mp4'" >> concat_list.txt
          if [ -f "recording3.mp4" ]; then
            echo "file 'recording3.mp4'" >> concat_list.txt
          fi
          echo "Concat list:"
          cat concat_list.txt

      # ── Step 3: Merge with ffmpeg — stream copy, no re-encoding (fast) ─────────
      - name: Merge recordings
        run: |
          ffmpeg -f concat -safe 0 -i concat_list.txt -c copy merged.mp4
          echo "Merged file size: $(du -sh merged.mp4 | cut -f1)"

      # ── Step 4: Upload merged file as a GitHub Release asset ───────────────────
      # Files are permanently stored in the repo's Releases. Public repo = public URL.
      # Fireflies downloads from this URL to generate the transcript.
      - name: Upload merged file (GitHub Release)
        id: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="session-${{ inputs.meeting_id }}"
          FILENAME="pragmatico-${{ inputs.meeting_id }}-${{ inputs.session_date }}.mp4"
          mv merged.mp4 "$FILENAME"

          # Create release (ok if it already exists)
          gh release create "$TAG" \
            --title "Session: ${{ inputs.session_title }} (${{ inputs.session_date }})" \
            --notes "Auto-merged Pragmatico recording" \
            --repo dancrrza/pragmatico-automations || true

          # Upload file to the release
          gh release upload "$TAG" "$FILENAME" \
            --clobber \
            --repo dancrrza/pragmatico-automations

          MERGED_URL="https://github.com/dancrrza/pragmatico-automations/releases/download/${TAG}/${FILENAME}"
          echo "MERGED_URL=${MERGED_URL}" >> $GITHUB_ENV
          echo "Public URL: ${MERGED_URL}"

      # ── Step 5: Upload to Fireflies ─────────────────────────────────────────────
      - name: Upload to Fireflies
        id: fireflies
        run: |
          TITLE="${{ inputs.session_title }} | ${{ inputs.session_date }}"
          echo "Uploading to Fireflies as: $TITLE"

          RESPONSE=$(curl -s -X POST https://api.fireflies.ai/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.FIREFLIES_API_KEY }}" \
            -d "{
              \"query\": \"mutation { uploadAudio(input: { url: \\\"${MERGED_URL}\\\", title: \\\"${TITLE}\\\" }) { success title } }\"
            }")

          echo "Fireflies response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
            data = json.load(sys.stdin)
            result = data.get('data', {}).get('uploadAudio', {})
            print(str(result.get('success', False)))
          except:
            print('False')
          ")

          echo "FIREFLIES_SUCCESS=${SUCCESS}" >> $GITHUB_ENV
          echo "Upload success: ${SUCCESS}"

      # ── Step 6: Notify n8n (always fires, even on failure) ──────────────────────
      - name: Notify n8n
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ env.FIREFLIES_SUCCESS }}" = "True" ]; then
            STATUS="done"
          else
            STATUS="error"
          fi

          curl -s -X POST "${{ secrets.N8N_CALLBACK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"${STATUS}\",
              \"meeting_id\": \"${{ inputs.meeting_id }}\",
              \"session_title\": \"${{ inputs.session_title }}\",
              \"session_date\": \"${{ inputs.session_date }}\",
              \"fireflies_success\": \"${{ env.FIREFLIES_SUCCESS }}\"
            }"

          echo "n8n notified — status: ${STATUS}"
